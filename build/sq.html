<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HALLE SOUVERAINE - CANAL DE CONCERTATION</title>
    <link rel="stylesheet" href="chatroom.css">
</head>
<body class="gov-style">
    <div class="main-layout">
        <aside class="left-aside">
            <h3>REGISTRE CVNU</h3>
            <div id="identity-vignette">
                <p>NIVEAU : <span id="lvl-display">04</span></p>
                <progress id="neutrality-score" value="0.5"></progress>
            </div>
        </aside>

        <main class="chat-viewport">
            <div id="messages" class="message-area"></div>
            <div class="input-bar">
                <input type="text" id="cmd-input" placeholder="Instruction citoyenne...">
                <button onclick="send()">TRANSMETTRE</button>
            </div>
        </main>

        <aside class="right-aside">
            <h3>BAIL ÉVOLUTIF</h3>
            <div class="contract-status">
                <p>STADE : <span class="badge">SEMENCE</span></p>
                <p>EQUITY : <span id="equity-val">0.00</span> €</p>
            </div>
            <div id="lpu-map">
                </div>
        </aside>
    </div>
</body>
</html>
